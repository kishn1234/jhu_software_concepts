services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grad_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grad_password}
      POSTGRES_DB: ${POSTGRES_DB:-grad_cafe}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: ./src/web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://grad_user:grad_password@db:5432/grad_cafe
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ./src/worker
    environment:
      DATABASE_URL: postgresql://grad_user:grad_password@db:5432/grad_cafe
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    volumes:
      - ./src/data:/data:ro
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
