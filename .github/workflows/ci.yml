name: Module 5 CI

on:
  push:
    paths:
      - "module_5/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "module_5/**"
      - ".github/workflows/ci.yml"

jobs:
  quality-security-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        working-directory: module_5
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run Pylint with required 10/10 score
        working-directory: module_5
        run: |
          pylint src --fail-under=10

      - name: Generate dependency graph
        working-directory: module_5
        run: |
          pydeps src --noshow -T svg -o dependency.svg
          test -f dependency.svg

      - name: Install Snyk CLI
        run: |
          npm install -g snyk

      - name: Run Snyk dependency scan
        working-directory: module_5
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test || true

      - name: Run Pytest with required coverage
        working-directory: module_5
        run: |
          python -m pytest